<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ralph-works social preview</title>
  <desc id="desc">A dark editorial preview card for the ralph-works Pi extension.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07090d"/>
      <stop offset="0.54" stop-color="#101821"/>
      <stop offset="1" stop-color="#0b1118"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0b85a"/>
      <stop offset="0.56" stop-color="#74d79b"/>
      <stop offset="1" stop-color="#5ecadd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.16">
    <path d="M0 104H1200M0 208H1200M0 312H1200M0 416H1200M0 520H1200" stroke="#f8f1e5"/>
    <path d="M120 0V630M240 0V630M360 0V630M480 0V630M600 0V630M720 0V630M840 0V630M960 0V630M1080 0V630" stroke="#f8f1e5"/>
  </g>
  <rect x="76" y="78" width="1048" height="474" rx="20" fill="rgba(255,255,255,0.055)" stroke="rgba(248,241,229,0.18)" filter="url(#shadow)"/>
  <rect x="118" y="132" width="590" height="128" rx="18" fill="rgba(217,210,196,0.92)"/>
  <text x="151" y="222" font-family="Inter, Arial, sans-serif" font-size="88" font-weight="700" letter-spacing="-5">
    <tspan fill="#26363d">ralph</tspan><tspan fill="#e6a51b">-</tspan><tspan fill="#2f6f7b">works</tspan>
  </text>
  <text x="122" y="332" fill="#f8f1e5" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="760" letter-spacing="-1">
    Agent autonomy with
  </text>
  <text x="122" y="394" fill="#f8f1e5" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="760" letter-spacing="-1">
    developer control.
  </text>
  <text x="124" y="454" fill="#b9c3ce" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500">
    Specs, gates, checkpoints, TDD, and review loops for Pi.
  </text>
  <rect x="122" y="490" width="516" height="8" rx="4" fill="url(#rail)"/>
  <g transform="translate(776 132)">
    <rect width="252" height="294" rx="14" fill="#101821" stroke="rgba(248,241,229,0.18)"/>
    <circle cx="34" cy="34" r="7" fill="#ff6b63"/>
    <circle cx="58" cy="34" r="7" fill="#f0b85a"/>
    <circle cx="82" cy="34" r="7" fill="#74d79b"/>
    <text x="28" y="94" fill="#7f8b98" font-family="SFMono-Regular, Consolas, monospace" font-size="18">$</text>
    <text x="54" y="94" fill="#f0b85a" font-family="SFMono-Regular, Consolas, monospace" font-size="18">/ralph-works start</text>
    <text x="28" y="146" fill="#f8f1e5" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">spec</text>
    <text x="28" y="186" fill="#f8f1e5" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">red team</text>
    <text x="28" y="226" fill="#f8f1e5" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">gates</text>
    <text x="28" y="266" fill="#f8f1e5" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">review</text>
  </g>
